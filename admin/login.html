<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — MiniDesk</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="logo" style="text-align:center;margin-bottom:32px;font-size:1.5rem;">Mini<span>Desk</span> <span
                    style="font-size:0.8rem;color:var(--muted);font-weight:400;">Admin</span></div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="admin@minidesk.ng" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn"
                    style="width:100%;text-align:center;margin-top:8px;">
                    Sign In
                </button>
                <div id="login-error"
                    style="color:#ff453a;text-align:center;margin-top:12px;font-size:0.85rem;display:none;"></div>
            </form>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('minidesk_admin_token');
        if (token) {
            fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'verify', token })
            })
                .then(r => r.json())
                .then(data => { if (data.valid) window.location.href = '/admin/'; })
                .catch(() => { });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            errorEl.style.display = 'none';

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'login',
                        email: document.getElementById('login-email').value,
                        password: document.getElementById('login-password').value
                    })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('minidesk_admin_token', data.token);
                    localStorage.setItem('minidesk_admin_email', data.user.email);
                    window.location.href = '/admin/';
                } else {
                    errorEl.textContent = data.error || 'Invalid credentials';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    </script>
</body>

</html>
