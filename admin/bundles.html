<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundles — MiniDesk Admin</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Expandable category in sidebar */
        .cat-group {
            margin-bottom: 4px;
        }

        .cat-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.15s;
        }

        .cat-group-header:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .cat-group-header .arrow {
            transition: transform 0.2s;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .cat-group.open .arrow {
            transform: rotate(90deg);
        }

        .cat-group-products {
            display: none;
            padding: 4px 0 4px 16px;
        }

        .cat-group.open .cat-group-products {
            display: block;
        }

        .cat-drag-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 3px 0;
            background: rgba(0, 113, 227, 0.06);
            border: 1px dashed rgba(0, 113, 227, 0.3);
            border-radius: 8px;
            cursor: grab;
            font-size: 0.82rem;
            transition: background 0.15s;
        }

        .cat-drag-item:hover {
            background: rgba(0, 113, 227, 0.12);
        }

        .cat-drag-item .drag-label {
            color: var(--muted);
            font-size: 0.72rem;
            margin-left: 8px;
        }

        .cat-drag-item.is-category {
            border-color: rgba(48, 209, 88, 0.3);
            background: rgba(48, 209, 88, 0.06);
        }

        .cat-drag-item.is-category:hover {
            background: rgba(48, 209, 88, 0.12);
        }

        /* Drop items with type indicator */
        .bundle-drop-item .item-type {
            font-size: 0.68rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
        }

        .item-type.product-type {
            background: rgba(0, 113, 227, 0.15);
            color: #0a84ff;
        }

        .item-type.category-type {
            background: rgba(48, 209, 88, 0.15);
            color: #30d158;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/admin/" class="logo" style="text-decoration:none;">Mini<span>Desk</span> <span
                style="font-size:0.75rem;color:var(--muted);font-weight:400;margin-left:4px;">Admin</span></a>
        <div class="admin-user">
            <span id="admin-email"></span>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <div class="admin-wrap">
        <div class="admin-tabs">
            <a href="/admin/" class="admin-tab">Orders</a>
            <a href="/admin/products.html" class="admin-tab">Products</a>
            <a href="/admin/categories.html" class="admin-tab">Categories</a>
            <a href="/admin/bundles.html" class="admin-tab active">Bundles</a>
        </div>

        <div class="admin-toolbar">
            <h2>Bundles</h2>
            <button class="btn-add" onclick="openBundleModal()">+ Add Bundle</button>
        </div>

        <!-- Bundle list -->
        <div class="admin-cards" id="bundles-grid">
            <div class="empty-state"><span class="icon">⏳</span>
                <p>Loading bundles...</p>
            </div>
        </div>

        <!-- Bundle Builder -->
        <div id="builder-section" style="display:none; margin-top: 32px;">
            <div class="admin-toolbar">
                <h2 id="builder-title">Configure: Bundle</h2>
                <button class="btn-add" onclick="saveConfiguration()">💾 Save Configuration</button>
            </div>

            <div class="bundle-builder">
                <!-- Sidebar: Categories (expandable) with products inside -->
                <div class="bundle-sidebar">
                    <h4>Available Items</h4>
                    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:10px;">
                        Drag a <span style="color:#0a84ff;">product</span> → Static (auto-included)<br>
                        Drag a <span style="color:#30d158;">category</span> → Configurable (customer picks)
                    </div>
                    <div id="available-items"></div>
                </div>

                <!-- Single drop column: Bundle Contents -->
                <div class="bundle-columns" style="flex:1;">
                    <div class="bundle-column" style="flex:1;">
                        <h4>📦 Bundle Contents</h4>
                        <div id="bundle-items-list"></div>
                        <div class="drop-placeholder" id="bundle-drop" ondragover="onDragOver(event)"
                            ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
                            Drop products or categories here
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bundle Create/Edit Modal -->
    <div class="modal-overlay" id="bundle-modal">
        <div class="modal">
            <h3 id="bm-title">Add Bundle</h3>
            <input type="hidden" id="bm-id">
            <div class="modal-field">
                <label>Name</label>
                <input type="text" id="bm-name" placeholder="e.g. Full Workspace Bundle">
            </div>
            <div class="modal-field">
                <label>Slug</label>
                <input type="text" id="bm-slug" placeholder="e.g. full">
            </div>
            <div class="modal-field">
                <label>Description</label>
                <textarea id="bm-desc" placeholder="What's in this bundle"></textarea>
            </div>
            <div class="modal-row">
                <div class="modal-field">
                    <label>Discount %</label>
                    <input type="number" id="bm-discount" value="20">
                </div>
                <div class="modal-field">
                    <label>Tag</label>
                    <input type="text" id="bm-tag" placeholder="e.g. Best Value">
                </div>
            </div>
            <div class="modal-field">
                <label>Sort Order</label>
                <input type="number" id="bm-sort" value="0">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeBundleModal()">Cancel</button>
                <button class="btn-save" id="bm-save" onclick="saveBundle()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('minidesk_admin_token');
        if (!token) window.location.href = '/admin/login.html';

        const emailEl = document.getElementById('admin-email');
        try { emailEl.textContent = JSON.parse(atob(token.split('.')[1])).email; } catch (e) { }

        function logout() { localStorage.removeItem('minidesk_admin_token'); localStorage.removeItem('minidesk_admin_email'); window.location.href = '/admin/login.html'; }
        function toast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        let bundles = [];
        let allCategories = [];
        let allProducts = [];
        let editingBundleId = null;
        let bundleItems = []; // Mixed array: { type: 'product'|'category', id, name, ... }

        // ── LOAD DATA ──
        async function loadBundles() {
            try {
                const [bRes, cRes, pRes] = await Promise.all([
                    fetch('/api/bundles?all=true', { headers: { Authorization: 'Bearer ' + token } }),
                    fetch('/api/categories'),
                    fetch('/api/products?all=true', { headers: { Authorization: 'Bearer ' + token } })
                ]);
                const bData = await bRes.json();
                const cData = await cRes.json();
                const pData = await pRes.json();
                bundles = bData.bundles || [];
                allCategories = cData.categories || [];
                allProducts = pData.products || [];
                renderBundles();
            } catch (e) { console.error(e); }
        }

        function renderBundles() {
            const grid = document.getElementById('bundles-grid');
            if (bundles.length === 0) {
                grid.innerHTML = '<div class="empty-state"><span class="icon">📦</span><p>No bundles yet.</p></div>';
                return;
            }
            grid.innerHTML = bundles.map(b => {
                const staticCount = (b.static_items || []).length;
                const configCount = (b.configurable_categories || []).length;
                const range = b.price_range || {};
                return `
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div>
                            <div class="admin-card-title">${b.name} ${b.tag ? `<span class="discount-badge" style="margin-left:6px;">${b.tag}</span>` : ''}</div>
                            <div class="admin-card-subtitle">${b.slug} · ${b.discount_percent}% off</div>
                        </div>
                        <div class="admin-card-actions">
                            <button class="btn-sm" onclick="openBuilder('${b.id}')">Configure</button>
                            <button class="btn-sm" onclick='editBundle(${JSON.stringify(b)})'>Edit</button>
                        </div>
                    </div>
                    <div class="admin-card-meta">${b.description || ''}</div>
                    <div class="admin-card-meta" style="margin-top:8px;">
                        <strong>${staticCount}</strong> static item${staticCount !== 1 ? 's' : ''} · <strong>${configCount}</strong> configurable
                        ${range.low ? ` · ₦${range.low.toLocaleString()} – ₦${range.high.toLocaleString()}` : ''}
                    </div>
                    ${!b.is_active ? '<div class="admin-card-meta" style="color:#ff453a;">⛔ Inactive</div>' : ''}
                </div>`;
            }).join('');
        }

        // ── BUNDLE MODAL ──
        function openBundleModal(b = null) {
            document.getElementById('bm-title').textContent = b ? 'Edit Bundle' : 'Add Bundle';
            document.getElementById('bm-id').value = b ? b.id : '';
            document.getElementById('bm-name').value = b ? b.name : '';
            document.getElementById('bm-slug').value = b ? b.slug : '';
            document.getElementById('bm-desc').value = b ? (b.description || '') : '';
            document.getElementById('bm-discount').value = b ? b.discount_percent : 20;
            document.getElementById('bm-tag').value = b ? (b.tag || '') : '';
            document.getElementById('bm-sort').value = b ? b.sort_order : bundles.length;
            document.getElementById('bundle-modal').classList.add('open');
        }

        function closeBundleModal() { document.getElementById('bundle-modal').classList.remove('open'); }
        function editBundle(b) { openBundleModal(b); }

        document.getElementById('bm-name').addEventListener('input', e => {
            if (!document.getElementById('bm-id').value) {
                document.getElementById('bm-slug').value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            }
        });

        async function saveBundle() {
            const id = document.getElementById('bm-id').value;
            const body = {
                name: document.getElementById('bm-name').value.trim(),
                slug: document.getElementById('bm-slug').value.trim(),
                description: document.getElementById('bm-desc').value.trim(),
                discount_percent: parseInt(document.getElementById('bm-discount').value) || 0,
                tag: document.getElementById('bm-tag').value.trim(),
                sort_order: parseInt(document.getElementById('bm-sort').value) || 0
            };
            if (!body.name || !body.slug) { toast('Name and slug required', 'error'); return; }

            const btn = document.getElementById('bm-save');
            btn.disabled = true;
            try {
                const url = id ? `/api/bundles?id=${id}` : '/api/bundles';
                const res = await fetch(url, {
                    method: id ? 'PATCH' : 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                toast(id ? 'Bundle updated' : 'Bundle created');
                closeBundleModal();
                loadBundles();
            } catch (e) { toast(e.message, 'error'); }
            finally { btn.disabled = false; }
        }

        // ── BUNDLE BUILDER ──
        function openBuilder(bundleId) {
            editingBundleId = bundleId;
            const bundle = bundles.find(b => b.id === bundleId);
            if (!bundle) return;

            document.getElementById('builder-title').textContent = 'Configure: ' + bundle.name;
            document.getElementById('builder-section').style.display = 'block';
            document.getElementById('builder-section').scrollIntoView({ behavior: 'smooth' });

            // Load existing configuration
            bundleItems = [];

            // Static items (individual products)
            (bundle.static_items || []).forEach(si => {
                bundleItems.push({
                    type: 'product',
                    product_id: si.product.id,
                    name: si.product.name,
                    price: si.product.price,
                    category_name: getCategoryName(si.product.category_id),
                    sort_order: si.sort_order
                });
            });

            // Configurable categories
            (bundle.configurable_categories || []).forEach(cc => {
                bundleItems.push({
                    type: 'category',
                    category_id: cc.id,
                    name: cc.name,
                    product_count: cc.product_count || cc.products?.length || 0,
                    sort_order: cc.sort_order
                });
            });

            // Sort by sort_order
            bundleItems.sort((a, b) => a.sort_order - b.sort_order);

            renderBuilder();
        }

        function getCategoryName(catId) {
            const cat = allCategories.find(c => c.id === catId);
            return cat ? cat.name : '';
        }

        function renderBuilder() {
            // Sidebar: show categories, each expandable with their products
            const usedProductIds = bundleItems.filter(i => i.type === 'product').map(i => i.product_id);
            const usedCategoryIds = bundleItems.filter(i => i.type === 'category').map(i => i.category_id);

            const sidebar = document.getElementById('available-items');
            let html = '';

            allCategories.forEach(cat => {
                const catProducts = allProducts.filter(p => p.category_id === cat.id && p.is_active !== false);
                const isUsedAsCategory = usedCategoryIds.includes(cat.id);

                // If the whole category is already in the bundle, skip it entirely
                if (isUsedAsCategory) return;

                // Filter out products already individually added
                const availableProducts = catProducts.filter(p => !usedProductIds.includes(p.id));

                if (availableProducts.length === 0 && catProducts.length === 0) return;

                html += `<div class="cat-group" id="cat-${cat.id}">`;
                html += `<div class="cat-group-header" onclick="toggleCatGroup('${cat.id}')">
                    <span>${cat.name} (${catProducts.length})</span>
                    <span class="arrow">▶</span>
                </div>`;
                html += `<div class="cat-group-products">`;

                // Drag the whole category (only if 2+ products available)
                if (catProducts.length >= 2) {
                    html += `<div class="cat-drag-item is-category" draggable="true"
                        ondragstart="startDrag(event, 'category', '${cat.id}', '${cat.name.replace(/'/g, "\\'")}', ${catProducts.length})">
                        📂 All ${cat.name} <span class="drag-label">Configurable</span>
                    </div>`;
                }

                // Drag individual products
                availableProducts.forEach(p => {
                    html += `<div class="cat-drag-item" draggable="true"
                        ondragstart="startDrag(event, 'product', '${p.id}', '${p.name.replace(/'/g, "\\'")}', 0, ${p.price}, '${cat.name.replace(/'/g, "\\'")}')">
                        ${p.name} <span class="drag-label">₦${p.price.toLocaleString()}</span>
                    </div>`;
                });

                html += `</div></div>`;
            });

            if (!html) {
                html = '<div style="color:var(--muted);font-size:0.82rem;padding:8px;">All items assigned</div>';
            }
            sidebar.innerHTML = html;

            // Bundle contents list
            const listEl = document.getElementById('bundle-items-list');
            if (bundleItems.length === 0) {
                listEl.innerHTML = '';
                return;
            }

            listEl.innerHTML = bundleItems.map((item, i) => {
                if (item.type === 'product') {
                    return `<div class="bundle-drop-item">
                        ${item.name}
                        <span class="item-type product-type">Static</span>
                        <span style="color:var(--muted);font-size:0.75rem;margin-left:4px;">₦${item.price.toLocaleString()}</span>
                        <button class="remove-item" onclick="removeItem(${i})">✕</button>
                    </div>`;
                } else {
                    return `<div class="bundle-drop-item">
                        ${item.name}
                        <span class="item-type category-type">Configurable · ${item.product_count} options</span>
                        <button class="remove-item" onclick="removeItem(${i})">✕</button>
                    </div>`;
                }
            }).join('');
        }

        function toggleCatGroup(catId) {
            document.getElementById('cat-' + catId)?.classList.toggle('open');
        }

        // ── DRAG & DROP ──
        let dragData = null;

        function startDrag(e, type, id, name, productCount, price, categoryName) {
            dragData = { type, id, name, productCount: productCount || 0, price: price || 0, categoryName: categoryName || '' };
            e.dataTransfer.effectAllowed = 'move';
        }

        function onDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        }

        function onDragLeave(e) {
            e.currentTarget.classList.remove('dragover');
        }

        function onDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            if (!dragData) return;

            if (dragData.type === 'product') {
                // Check not already added
                if (bundleItems.some(i => i.type === 'product' && i.product_id === dragData.id)) {
                    toast('Product already in bundle', 'error');
                    dragData = null;
                    return;
                }
                bundleItems.push({
                    type: 'product',
                    product_id: dragData.id,
                    name: dragData.name,
                    price: dragData.price,
                    category_name: dragData.categoryName,
                    sort_order: bundleItems.length
                });
            } else if (dragData.type === 'category') {
                // Check not already added
                if (bundleItems.some(i => i.type === 'category' && i.category_id === dragData.id)) {
                    toast('Category already in bundle', 'error');
                    dragData = null;
                    return;
                }
                // Remove any individual products from this category (the whole category supersedes)
                const catProducts = allProducts.filter(p => p.category_id === dragData.id);
                const catProductIds = catProducts.map(p => p.id);
                const removed = bundleItems.filter(i => i.type === 'product' && catProductIds.includes(i.product_id));
                if (removed.length > 0) {
                    bundleItems = bundleItems.filter(i => !(i.type === 'product' && catProductIds.includes(i.product_id)));
                    toast(`Removed ${removed.length} individual product(s) — full category now covers them`);
                }

                bundleItems.push({
                    type: 'category',
                    category_id: dragData.id,
                    name: dragData.name,
                    product_count: dragData.productCount,
                    sort_order: bundleItems.length
                });
            }

            dragData = null;
            renderBuilder();
        }

        function removeItem(index) {
            bundleItems.splice(index, 1);
            renderBuilder();
        }

        // ── SAVE ──
        async function saveConfiguration() {
            if (!editingBundleId) return;

            const items = bundleItems.map((item, i) => {
                if (item.type === 'product') {
                    return { product_id: item.product_id, role: 'static', sort_order: i };
                } else {
                    return { category_id: item.category_id, role: 'configurable', sort_order: i };
                }
            });

            try {
                const res = await fetch(`/api/bundles?action=categories&id=${editingBundleId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify({ items })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                toast('Bundle configuration saved!');
                loadBundles();
            } catch (e) { toast(e.message, 'error'); }
        }

        loadBundles();
    </script>
</body>

</html>
