<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — MiniDesk Admin</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <nav>
        <a href="/admin/" class="logo" style="text-decoration:none;">Mini<span>Desk</span> <span
                style="font-size:0.75rem;color:var(--muted);font-weight:400;margin-left:4px;">Admin</span></a>
        <div class="admin-user">
            <span id="admin-email"></span>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <div class="admin-wrap">
        <div class="admin-tabs">
            <a href="/admin/" class="admin-tab">Orders</a>
            <a href="/admin/products.html" class="admin-tab active">Products</a>
            <a href="/admin/categories.html" class="admin-tab">Categories</a>
            <a href="/admin/bundles.html" class="admin-tab">Bundles</a>
        </div>

        <!-- Filter by category -->
        <div class="admin-toolbar">
            <h2>Products</h2>
            <button class="btn-add" onclick="openProductModal()">+ Add Product</button>
        </div>
        <div class="filter-bar" id="cat-filters"></div>

        <div class="admin-cards" id="products-grid">
            <div class="empty-state"><span class="icon">⏳</span>
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal" style="max-width:620px;">
            <h3 id="pm-title">Add Product</h3>
            <input type="hidden" id="pm-id">

            <div class="modal-row">
                <div class="modal-field">
                    <label>Name</label>
                    <input type="text" id="pm-name" placeholder="e.g. Dell S2725DS">
                </div>
                <div class="modal-field">
                    <label>Slug</label>
                    <input type="text" id="pm-slug" placeholder="e.g. mid">
                </div>
            </div>

            <div class="modal-field">
                <label>Description</label>
                <textarea id="pm-desc" placeholder="Product description"></textarea>
            </div>

            <div class="modal-row">
                <div class="modal-field">
                    <label>Price (₦)</label>
                    <input type="number" id="pm-price" placeholder="e.g. 540400">
                </div>
                <div class="modal-field">
                    <label>Category</label>
                    <select id="pm-category"></select>
                </div>
            </div>

            <div class="modal-row">
                <div class="modal-field">
                    <label>Tag</label>
                    <input type="text" id="pm-tag" placeholder="e.g. MID RANGE">
                </div>
                <div class="modal-field">
                    <label>Sort Order</label>
                    <input type="number" id="pm-sort" value="0">
                </div>
            </div>

            <div class="modal-row">
                <div class="modal-field">
                    <label style="margin-bottom:10px;">Add-on?</label>
                    <div class="toggle-wrap">
                        <button class="toggle" id="pm-addon" onclick="this.classList.toggle('on')"></button>
                        <span style="font-size:0.82rem;color:var(--muted);">Sell as standalone add-on</span>
                    </div>
                </div>
                <div class="modal-field">
                    <label style="margin-bottom:10px;">Active?</label>
                    <div class="toggle-wrap">
                        <button class="toggle on" id="pm-active" onclick="this.classList.toggle('on')"></button>
                        <span style="font-size:0.82rem;color:var(--muted);">Visible to customers</span>
                    </div>
                </div>
            </div>

            <!-- Image Upload -->
            <div class="modal-field">
                <label>Images</label>
                <div class="dropzone" id="pm-dropzone">
                    <span class="drop-icon">📷</span>
                    Drag & drop images here, or click to browse
                    <input type="file" id="pm-file-input" accept="image/*" multiple style="display:none;">
                </div>
                <div class="image-previews" id="pm-images"></div>
            </div>

            <!-- Color Options -->
            <div class="modal-field">
                <label>Color Options</label>
                <div class="color-options-list" id="pm-colors"></div>
                <button class="btn-add-color" onclick="addColorRow()">+ Add Color</button>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeProductModal()">Cancel</button>
                <button class="btn-save" id="pm-save" onclick="saveProduct()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('minidesk_admin_token');
        if (!token) window.location.href = '/admin/login.html';

        const emailEl = document.getElementById('admin-email');
        try { emailEl.textContent = JSON.parse(atob(token.split('.')[1])).email; } catch (e) { }

        function logout() { localStorage.removeItem('minidesk_admin_token'); localStorage.removeItem('minidesk_admin_email'); window.location.href = '/admin/login.html'; }
        function toast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        let products = [];
        let categories = [];
        let productImages = []; // URLs being managed in modal
        let activeFilter = 'all';

        // ── LOAD DATA ──
        async function loadData() {
            try {
                const [pRes, cRes] = await Promise.all([
                    fetch('/api/products?all=true', { headers: { Authorization: 'Bearer ' + token } }),
                    fetch('/api/categories')
                ]);
                const pData = await pRes.json();
                const cData = await cRes.json();
                products = pData.products || [];
                categories = cData.categories || [];
                renderFilters();
                renderProducts();
            } catch (e) { console.error(e); }
        }

        function renderFilters() {
            const el = document.getElementById('cat-filters');
            const counts = { all: products.length };
            categories.forEach(c => { counts[c.id] = 0; });
            products.forEach(p => { if (p.category_id && counts[p.category_id] !== undefined) counts[p.category_id]++; });

            el.innerHTML = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="filterBy('all', this)">All (${counts.all})</button>`
                + categories.map(c =>
                    `<button class="filter-btn ${activeFilter === c.id ? 'active' : ''}" onclick="filterBy('${c.id}', this)">${c.name} (${counts[c.id] || 0})</button>`
                ).join('');
        }

        function filterBy(val, btn) {
            activeFilter = val;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            let filtered = products;
            if (activeFilter !== 'all') {
                filtered = products.filter(p => p.category_id === activeFilter);
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><span class="icon">📦</span><p>No products found.</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const cat = categories.find(c => c.id === p.category_id);
                const img = (p.images && p.images.length > 0) ? p.images[0] : p.image;
                return `
                <div class="admin-card">
                    ${img ? `<div class="product-card-img"><img src="${img}" alt="${p.name}"></div>` : ''}
                    <div class="admin-card-header">
                        <div>
                            <div class="admin-card-title">${p.name}</div>
                            ${p.tag ? `<div class="admin-card-subtitle" style="color:var(--accent);font-weight:600;">${p.tag}</div>` : ''}
                        </div>
                        <div class="admin-card-actions">
                            <button class="btn-sm" onclick='editProduct("${p.id}")'>Edit</button>
                            <button class="btn-sm danger" onclick="deleteProduct('${p.id}')">Delete</button>
                        </div>
                    </div>
                    <div class="product-card-price">₦${p.price.toLocaleString()}</div>
                    ${cat ? `<span class="product-card-category">${cat.name}</span>` : ''}
                    ${p.is_addon ? '<span class="product-card-category" style="background:rgba(175,82,222,0.1);color:#bf5af2;margin-left:4px;">Add-on</span>' : ''}
                    ${!p.is_active ? '<div class="admin-card-meta" style="color:#ff453a;">⛔ Inactive</div>' : ''}
                </div>`;
            }).join('');
        }

        // ── PRODUCT MODAL ──
        function openProductModal(p = null) {
            document.getElementById('pm-title').textContent = p ? 'Edit Product' : 'Add Product';
            document.getElementById('pm-id').value = p ? p.id : '';
            document.getElementById('pm-name').value = p ? p.name : '';
            document.getElementById('pm-slug').value = p ? p.slug : '';
            document.getElementById('pm-desc').value = p ? (p.description || '') : '';
            document.getElementById('pm-price').value = p ? p.price : '';
            document.getElementById('pm-tag').value = p ? (p.tag || '') : '';
            document.getElementById('pm-sort').value = p ? p.sort_order : products.length;

            // Category dropdown
            const catSelect = document.getElementById('pm-category');
            catSelect.innerHTML = '<option value="">— Select —</option>'
                + categories.map(c => `<option value="${c.id}" ${p && p.category_id === c.id ? 'selected' : ''}>${c.name}</option>`).join('');

            // Toggles
            const addonBtn = document.getElementById('pm-addon');
            addonBtn.className = 'toggle' + (p && p.is_addon ? ' on' : '');
            const activeBtn = document.getElementById('pm-active');
            activeBtn.className = 'toggle' + ((!p || p.is_active !== false) ? ' on' : '');

            // Images
            productImages = p && p.images ? [...p.images] : [];
            renderImagePreviews();

            // Colors
            const colors = p && p.color_options ? p.color_options : [];
            renderColorOptions(colors);

            document.getElementById('product-modal').classList.add('open');
        }

        function closeProductModal() { document.getElementById('product-modal').classList.remove('open'); }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if (p) openProductModal(p);
        }

        // Auto-slug
        document.getElementById('pm-name').addEventListener('input', e => {
            if (!document.getElementById('pm-id').value) {
                document.getElementById('pm-slug').value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            }
        });

        // ── IMAGE UPLOAD ──
        const dropzone = document.getElementById('pm-dropzone');
        const fileInput = document.getElementById('pm-file-input');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        async function handleFiles(files) {
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result;
                    dropzone.innerHTML = '<span class="drop-icon">⏳</span> Uploading...';

                    try {
                        const res = await fetch('/api/upload', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                            body: JSON.stringify({ file: base64, filename: file.name })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error);

                        productImages.push(data.url);
                        renderImagePreviews();
                        toast('Image uploaded');
                    } catch (err) {
                        toast('Upload failed: ' + err.message, 'error');
                    }

                    dropzone.innerHTML = '<span class="drop-icon">📷</span> Drag & drop images here, or click to browse';
                };
                reader.readAsDataURL(file);
            }
        }

        function renderImagePreviews() {
            const el = document.getElementById('pm-images');
            el.innerHTML = productImages.map((url, i) => `
                <div class="img-preview">
                    <img src="${url}" alt="Product image">
                    <button class="img-remove" onclick="removeImage(${i})">✕</button>
                </div>
            `).join('');
        }

        function removeImage(i) {
            productImages.splice(i, 1);
            renderImagePreviews();
        }

        // ── COLOR OPTIONS ──
        function renderColorOptions(colors = []) {
            const el = document.getElementById('pm-colors');
            el.innerHTML = colors.map((c, i) => `
                <div class="color-option-row">
                    <input type="text" value="${c.name || ''}" placeholder="Color name" data-color-name="${i}">
                    <input type="color" value="${c.hex || '#555555'}" data-color-hex="${i}">
                    <input type="text" value="${c.img || ''}" placeholder="Image URL" data-color-img="${i}" style="flex:2;">
                    <button class="btn-sm danger" onclick="this.parentElement.remove()" style="flex-shrink:0;">✕</button>
                </div>
            `).join('');
        }

        function addColorRow() {
            const el = document.getElementById('pm-colors');
            const i = el.children.length;
            const row = document.createElement('div');
            row.className = 'color-option-row';
            row.innerHTML = `
                <input type="text" value="" placeholder="Color name" data-color-name="${i}">
                <input type="color" value="#555555" data-color-hex="${i}">
                <input type="text" value="" placeholder="Image URL" data-color-img="${i}" style="flex:2;">
                <button class="btn-sm danger" onclick="this.parentElement.remove()" style="flex-shrink:0;">✕</button>
            `;
            el.appendChild(row);
        }

        function collectColors() {
            const rows = document.querySelectorAll('#pm-colors .color-option-row');
            const colors = [];
            rows.forEach(row => {
                const name = row.querySelector('input[data-color-name]').value.trim();
                const hex = row.querySelector('input[data-color-hex]').value;
                const img = row.querySelector('input[data-color-img]').value.trim();
                if (name) colors.push({ name, hex, img: img || null, slug: name.toLowerCase().replace(/[^a-z0-9]+/g, '-') });
            });
            return colors;
        }

        // ── SAVE PRODUCT ──
        async function saveProduct() {
            const id = document.getElementById('pm-id').value;
            const body = {
                name: document.getElementById('pm-name').value.trim(),
                slug: document.getElementById('pm-slug').value.trim(),
                description: document.getElementById('pm-desc').value.trim(),
                price: parseInt(document.getElementById('pm-price').value) || 0,
                category_id: document.getElementById('pm-category').value || null,
                tag: document.getElementById('pm-tag').value.trim(),
                sort_order: parseInt(document.getElementById('pm-sort').value) || 0,
                is_addon: document.getElementById('pm-addon').classList.contains('on'),
                is_active: document.getElementById('pm-active').classList.contains('on'),
                images: productImages,
                color_options: collectColors(),
                // Keep old fields for backward compatibility
                category: getCategorySlug(document.getElementById('pm-category').value),
                image: productImages[0] || ''
            };

            if (!body.name || !body.slug || !body.price) {
                toast('Name, slug, and price are required', 'error');
                return;
            }

            const btn = document.getElementById('pm-save');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const url = id ? `/api/products?id=${id}` : '/api/products';
                const res = await fetch(url, {
                    method: id ? 'PATCH' : 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                toast(id ? 'Product updated' : 'Product created');
                closeProductModal();
                loadData();
            } catch (e) {
                toast(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save';
            }
        }

        function getCategorySlug(catId) {
            const cat = categories.find(c => c.id === catId);
            return cat ? cat.slug : '';
        }

        // ── DELETE ──
        async function deleteProduct(id) {
            const choice = prompt('Type "delete" to permanently remove, or "deactivate" to hide from customers:');
            if (!choice) return;
            const hard = choice.trim().toLowerCase() === 'delete';

            try {
                const url = hard ? `/api/products?id=${id}&hard=true` : `/api/products?id=${id}`;
                const res = await fetch(url, {
                    method: 'DELETE',
                    headers: { Authorization: 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                toast(hard ? 'Product permanently deleted' : 'Product deactivated');
                loadData();
            } catch (e) { toast(e.message, 'error'); }
        }

        loadData();
    </script>
</body>

</html>
